<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mahjong Score Tracker</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fdfbf7;
            color: #333;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
        }
        
        /* Language Toggle Styles */
        .lang-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            background: #e0e0e0;
            border-radius: 20px;
            overflow: hidden;
        }
        .lang-toggle button {
            background: transparent;
            border: none;
            padding: 8px 15px;
            font-size: 0.9rem;
            cursor: pointer;
            color: #7f8c8d;
            font-weight: bold;
            transition: 0.3s;
            border-radius: 20px;
        }
        .lang-toggle button.active {
            background: #2c3e50;
            color: white;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 5px;
            margin-top: 30px;
        }
        .subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        
        .rules-link { text-align: center; margin-bottom: 25px; }
        .rules-link a { 
            color: #2980b9; text-decoration: none; font-weight: bold; padding: 8px 15px; 
            border: 1px solid #2980b9; border-radius: 20px; transition: 0.2s; 
        }
        .rules-link a:hover { background-color: #2980b9; color: white; }

        .top-controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 25px;
        }
        .top-controls button {
            flex: 1; max-width: 300px; padding: 12px 20px; font-size: 1.1rem;
            font-weight: bold; color: white; border: none; border-radius: 8px;
            cursor: pointer; transition: opacity 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .top-controls button:active:not(:disabled) { opacity: 0.8; }
        .btn-undo { background-color: #f39c12; }
        .btn-undo:disabled { background-color: #bdc3c7; cursor: not-allowed; box-shadow: none; }
        
        .master-scoreboard {
            background: #2c3e50; color: white; padding: 20px; border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15); margin-bottom: 20px;
            display: flex; flex-direction: column; align-items: center; text-align: center;
        }
        .combined-net-label { font-size: 1rem; color: #bdc3c7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .combined-net-value { font-size: 3.5rem; font-weight: bold; margin-bottom: 20px; border-bottom: 1px solid #34495e; padding-bottom: 20px; width: 100%; }
        .combined-net-value.positive { color: #2ecc71; }
        .combined-net-value.negative { color: #e74c3c; }
        .combined-net-value.neutral { color: #ecf0f1; }

        .tally-row { display: flex; justify-content: space-around; width: 100%; }
        .tally-item { flex: 1; padding: 0 5px; }
        .tally-name { font-size: 0.95rem; color: #bdc3c7; font-weight: bold; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .tally-value { font-size: 1.6rem; font-weight: bold; }
        .tally-value.positive { color: #2ecc71; }
        .tally-value.negative { color: #e74c3c; }
        .tally-value.neutral { color: #ecf0f1; }

        .manual-adjust {
            background: #fff; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin-bottom: 25px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; justify-content: center;
        }
        .manual-adjust-label { font-weight: bold; color: #7f8c8d; padding: 0 10px; }
        .manual-adjust input { padding: 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; flex: 1; min-width: 120px; }
        .manual-adjust-btns { display: flex; gap: 10px; }
        .manual-adjust-btns button { width: 50px; padding: 10px; font-size: 1.2rem; font-weight: bold; color: white; border: none; border-radius: 8px; cursor: pointer; }
        .btn-add { background-color: #27ae60; }
        .btn-sub { background-color: #e74c3c; }

        .board { display: flex; flex-direction: column; gap: 15px; }
        .player-card { background: #fff; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); overflow: hidden; }
        .card-header { padding: 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; }
        .header-left { display: flex; flex-direction: column; align-items: flex-start; }
        .header-name { font-size: 1.1rem; font-weight: bold; color: #2c3e50; margin-bottom: 5px; }
        .header-score { font-size: 1.8rem; font-weight: bold; }
        .header-right { display: flex; align-items: center; gap: 15px; }
        .header-info { display: flex; flex-direction: column; align-items: flex-end; font-size: 0.85rem; color: #7f8c8d; }
        .header-badge { display: inline-block; padding: 3px 8px; border-radius: 8px; font-weight: bold; color: white; margin-top: 4px; font-size: 0.8rem; }
        .collapse-icon { font-size: 1.2rem; color: #bdc3c7; transition: transform 0.3s ease; }

        .card-body { padding: 15px; background-color: #fcfcfc; border-top: 1px solid #eee; }
        .points-input { width: calc(100% - 24px); padding: 12px; font-size: 1.1rem; text-align: center; border: 2px solid #ddd; border-radius: 8px; margin-bottom: 15px; }
        .action-buttons { display: flex; gap: 10px; margin-bottom: 10px; }
        .action-buttons button { flex: 1; padding: 12px; font-size: 1.1rem; font-weight: bold; color: white; border: none; border-radius: 8px; cursor: pointer; }
        .btn-win { background-color: #27ae60; }
        .btn-lose { background-color: #e74c3c; }
        
        .btn-special { width: 100%; margin-top: 8px; padding: 12px; font-size: 1rem; font-weight: bold; color: white; border: none; border-radius: 8px; cursor: pointer; }
        .btn-half { background-color: #16a085; }
        .btn-surrender { background-color: #f39c12; }
        .btn-bank { background-color: #8e44ad; }
        .btn-tally-local { background-color: #2980b9; }
        .btn-special:disabled { background-color: #bdc3c7; cursor: not-allowed; color: #7f8c8d; }
        
        .footer-controls { text-align: center; margin-top: 30px; }
        .btn-hard-reset { background-color: transparent; color: #e74c3c; border: 1px solid #e74c3c; padding: 10px 20px; font-size: 0.9rem; border-radius: 8px; cursor: pointer; }

        /* Modal Styles */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #fff; padding: 30px; border-radius: 12px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .modal-content input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; font-size: 1.1rem; box-sizing: border-box; text-align: center; }
        .modal-content button { width: 100%; padding: 15px; background: #2980b9; color: white; border: none; border-radius: 8px; font-size: 1.2rem; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="modal-overlay" id="name-modal">
        <div class="modal-content">
            <h2 id="modal-title">Enter Player Names</h2>
            <input type="text" id="p1-name" placeholder="Player 1">
            <input type="text" id="p2-name" placeholder="Player 2">
            <input type="text" id="p3-name" placeholder="Player 3">
            <button onclick="saveInitialNames()" id="modal-btn">Start Game</button>
        </div>
    </div>

    <div class="lang-toggle">
        <button id="lang-en" onclick="setLanguage('en')">EN</button>
        <button id="lang-zh" onclick="setLanguage('zh')">粵</button>
    </div>

    <h1 id="ui-title">Mahjong Score Tracker</h1>
    <div class="subtitle" id="ui-subtitle">Base 5 points auto-applied.</div>
    <div class="rules-link"><a href="rules.html" id="ui-rules">📖 View Taiwanese Scoring Rules</a></div>

    <div class="top-controls"><button class="btn-undo" id="btn-undo" onclick="undoLastAction()" disabled>⟲ Undo Last Action</button></div>
    <div class="master-scoreboard" id="master-scoreboard"></div>
    <div class="manual-adjust" id="manual-adjust-container"></div>
    <div class="board" id="board"></div>
    <div class="footer-controls"><button class="btn-hard-reset" id="btn-hard-reset" onclick="hardReset()">Hard Reset (Wipe Everything)</button></div>

    <script>
        const TWENTY_FOUR_HOURS = 24 * 60 * 60 * 1000;

        const i18n = {
            en: {
                title: "Mahjong Score Tracker", subtitle: "Base 5 points auto-applied.", rulesLink: "📖 View Taiwanese Scoring Rules",
                netScore: "Combined Table Net Score", noStreak: "No active streak", winStreak: "Win Streak", lossStreak: "Loss Streak",
                multiplier: "1.5x Active", handPoints: "Hand points", winBtn: "Win (+)", loseBtn: "Lose (-)",
                revengeBtn: "Revenge & Update Tally", bankNeed3: "Bank / Surrender (Need 3 Streak)", bankWinnings: "Bank Winnings & Reset",
                surrenderDebt: "Surrender & Set Aside Debt", undoBtn: "⟲ Undo Last Action", tallyBtn: "Pay/Collect & Update Tally",
                resetBtn: "Hard Reset (Wipe Everything)", badgeDebt: "Debt: ", badgeBanked: "Banked: +", adjustPlaceholder: "Amount",
                targetTable: "Table Net Score", modalTitle: "Enter Player Names", player: "Player", modalBtn: "Start Game",
                confirmBank: "Do you want to bank your winnings of", confirmSurrender: "Do you want to set aside your debt of",
                confirmResetStreak: "points and reset your active streak?", confirmPlayerPay: "Update this player's tally?", confirmWipe: "WARNING: Wipe everything?"
            },
            zh: {
                title: "麻雀計分器", subtitle: "自動加上5分底分。", rulesLink: "📖 查看台灣麻雀計分規則",
                netScore: "全檯總結算", noStreak: "沒有連勝/連敗", winStreak: "連勝", lossStreak: "連敗",
                multiplier: "1.5倍生效", handPoints: "番數 / 分數", winBtn: "贏 (+)", loseBtn: "輸 (-)",
                revengeBtn: "報仇並更新總結算", bankNeed3: "儲起 / 投降 (需連中3次)", bankWinnings: "儲起贏分並重置",
                surrenderDebt: "投降並記下欠債", undoBtn: "⟲ 復原上一步", tallyBtn: "收/付並更新總結算",
                resetBtn: "完全重置 (清除所有資料)", badgeDebt: "欠債: ", badgeBanked: "儲起: +", adjustPlaceholder: "手動調整分數",
                targetTable: "全檯總結算", modalTitle: "輸入玩家名稱", player: "玩家", modalBtn: "開始遊戲",
                confirmBank: "你確定要儲起", confirmSurrender: "你確定要記下", confirmResetStreak: "分並重置連擊嗎？",
                confirmPlayerPay: "更新此玩家的總結算？", confirmWipe: "警告：確定要完全清除所有資料嗎？"
            }
        };

        let currentLang = localStorage.getItem('mahjongLang') || 'en';
        const defaultPlayers = [
            { id: 0, name: "Player 1", score: 0, streakType: null, streakCount: 0, setAsidePoints: 0, runningTally: 0, isExpanded: false },
            { id: 1, name: "Player 2", score: 0, streakType: null, streakCount: 0, setAsidePoints: 0, runningTally: 0, isExpanded: false },
            { id: 2, name: "Player 3", score: 0, streakType: null, streakCount: 0, setAsidePoints: 0, runningTally: 0, isExpanded: false }
        ];

        let players = defaultPlayers;
        let tableOffset = 0;
        let historyStack = [];

        function checkExpiry() {
            const data = JSON.parse(localStorage.getItem('mahjongData'));
            if (data && data.timestamp && (new Date().getTime() - data.timestamp > TWENTY_FOUR_HOURS)) {
                localStorage.removeItem('mahjongData');
                location.reload();
            }
        }

        function loadData() {
            const data = JSON.parse(localStorage.getItem('mahjongData'));
            if (data) {
                players = data.players || defaultPlayers;
                tableOffset = data.tableOffset || 0;
            } else {
                showNameModal();
            }
        }

        function saveData() {
            localStorage.setItem('mahjongData', JSON.stringify({ players, tableOffset, timestamp: new Date().getTime() }));
        }

        function saveStateForUndo() {
            historyStack.push({ players: JSON.parse(JSON.stringify(players)), tableOffset });
            if (historyStack.length > 20) historyStack.shift();
        }

        function undoLastAction() {
            if (historyStack.length > 0) {
                const state = historyStack.pop();
                players = state.players; tableOffset = state.tableOffset;
                saveData(); render();
            }
        }

        function showNameModal() {
            const t = i18n[currentLang];
            document.getElementById('modal-title').innerText = t.modalTitle;
            document.getElementById('modal-btn').innerText = t.modalBtn;
            document.getElementById('name-modal').style.display = 'flex';
        }

        function saveInitialNames() {
            const t = i18n[currentLang];
            players[0].name = document.getElementById('p1-name').value.trim() || (t.player + " 1");
            players[1].name = document.getElementById('p2-name').value.trim() || (t.player + " 2");
            players[2].name = document.getElementById('p3-name').value.trim() || (t.player + " 3");
            document.getElementById('name-modal').style.display = 'none';
            saveData(); render();
        }

        function recordHand(index, resultType) {
            saveStateForUndo();
            const input = document.getElementById(`points-${index}`);
            const points = (parseInt(input.value) || 0) + 5;
            let p = players[index];
            if (p.streakType === resultType) {
                p.score = p.score >= 0 ? Math.ceil(Math.abs(p.score) * 1.5) : -Math.ceil(Math.abs(p.score) * 1.5);
                p.streakCount++;
            } else { p.streakType = resultType; p.streakCount = 1; }
            p.score += (resultType === 'win' ? points : -points);
            input.value = ''; saveData(); render();
        }

        function halveScore(index) {
            saveStateForUndo();
            let p = players[index];
            p.score = p.score > 0 ? Math.floor(p.score / 2) : Math.ceil(p.score / 2);
            p.runningTally += (p.score + p.setAsidePoints);
            p.score = 0; p.streakType = null; p.streakCount = 0; p.setAsidePoints = 0;
            saveData(); render();
        }

        function sweepPlayerToTally(index) {
            if (confirm(i18n[currentLang].confirmPlayerPay)) {
                saveStateForUndo();
                let p = players[index];
                p.runningTally += (p.score + p.setAsidePoints);
                p.score = 0; p.streakType = null; p.streakCount = 0; p.setAsidePoints = 0;
                saveData(); render();
            }
        }

        function bankOrSurrender(index) {
            let p = players[index];
            const t = i18n[currentLang];
            if (confirm(`${p.score > 0 ? t.confirmBank : t.confirmSurrender} ${p.score} ${t.confirmResetStreak}`)) {
                saveStateForUndo();
                p.setAsidePoints += p.score; p.score = 0; p.streakType = null; p.streakCount = 0;
                saveData(); render();
            }
        }

        function applyManualAdjustment(isAdd) {
            const input = document.getElementById('adjust-amount');
            let amt = parseInt(input.value);
            if (!amt) return;
            saveStateForUndo();
            tableOffset += (isAdd ? amt : -amt);
            input.value = ''; saveData(); render();
        }

        function setLanguage(lang) { currentLang = lang; localStorage.setItem('mahjongLang', lang); render(); }
        function toggleCollapse(idx) { players[idx].isExpanded = !players[idx].isExpanded; saveData(); render(); }
        function hardReset() { if (confirm(i18n[currentLang].confirmWipe)) { localStorage.removeItem('mahjongData'); location.reload(); } }

        function render() {
            checkExpiry();
            const t = i18n[currentLang];
            document.getElementById('ui-title').innerText = t.title;
            document.getElementById('ui-subtitle').innerText = t.subtitle;
            document.getElementById('ui-rules').innerText = t.rulesLink;
            document.getElementById('btn-undo').innerText = t.undoBtn;
            document.getElementById('btn-undo').disabled = historyStack.length === 0;
            document.getElementById('lang-en').className = currentLang === 'en' ? 'active' : '';
            document.getElementById('lang-zh').className = currentLang === 'zh' ? 'active' : '';

            let globalNet = tableOffset;
            let talliesHtml = '<div class="tally-row">';
            const board = document.getElementById('board');
            board.innerHTML = '';

            players.forEach((p, i) => {
                globalNet += p.runningTally;
                const tCls = p.runningTally > 0 ? 'positive' : (p.runningTally < 0 ? 'negative' : 'neutral');
                talliesHtml += `<div class="tally-item"><div class="tally-name">${p.name}</div><div class="tally-value ${tCls}">${p.runningTally > 0 ? '+' : ''}${p.runningTally}</div></div>`;

                const sCls = p.score > 0 ? 'positive' : (p.score < 0 ? 'negative' : 'neutral');
                const badge = p.setAsidePoints !== 0 ? `<div class="header-badge ${p.setAsidePoints > 0 ? 'bg-banked' : 'bg-debt'}">${p.setAsidePoints > 0 ? t.badgeBanked : t.badgeDebt}${p.setAsidePoints}</div>` : '';
                const streak = p.streakCount > 0 ? `<span style="color:${p.streakType === 'win' ? '#27ae60' : '#e74c3c'};font-weight:bold;">${p.streakCount} ${p.streakType === 'win' ? t.winStreak : t.lossStreak}</span>` : '';

                const card = document.createElement('div');
                card.className = 'player-card';
                card.innerHTML = `
                    <div class="card-header" onclick="toggleCollapse(${i})">
                        <div class="header-left"><div class="header-name">${p.name}</div><div class="header-score ${sCls}">${p.score > 0 ? '+' : ''}${p.score}</div></div>
                        <div class="header-right"><div class="header-info">${streak}${badge}</div><div class="collapse-icon" style="transform:rotate(${p.isExpanded ? 180 : 0}deg)">▼</div></div>
                    </div>
                    <div class="card-body" style="display:${p.isExpanded ? 'block' : 'none'}">
                        <div class="streak" style="text-align:center;margin-bottom:10px;font-size:0.9rem;color:#7f8c8d">${p.streakCount > 0 ? p.streakCount + ' ' + (p.streakType === 'win' ? t.winStreak : t.lossStreak) + '<br>' + t.multiplier : t.noStreak}</div>
                        <input type="number" id="points-${i}" class="points-input" placeholder="${t.handPoints}">
                        <div class="action-buttons"><button class="btn-win" onclick="recordHand(${i},'win')">${t.winBtn}</button><button class="btn-lose" onclick="recordHand(${i},'lose')">${t.loseBtn}</button></div>
                        <button class="btn-special ${p.streakType === 'win' ? 'btn-bank' : 'btn-surrender'}" onclick="bankOrSurrender(${i})" ${p.streakCount >= 3 ? '' : 'disabled'}>${p.streakType === 'win' ? t.bankWinnings : t.surrenderDebt}</button>
                        <button class="btn-special btn-half" onclick="halveScore(${i})" ${p.score === 0 ? 'disabled' : ''}>${t.revengeBtn}</button>
                        <button class="btn-special btn-tally-local" onclick="sweepPlayerToTally(${i})">${t.tallyBtn}</button>
                    </div>`;
                board.appendChild(card);
            });

            document.getElementById('master-scoreboard').innerHTML = `<div class="combined-net-label">${t.netScore}</div><div class="combined-net-value ${globalNet > 0 ? 'positive' : (globalNet < 0 ? 'negative' : 'neutral')}">${globalNet > 0 ? '+' : ''}${globalNet}</div>${talliesHtml}</div>`;
            document.getElementById('manual-adjust-container').innerHTML = `<div class="manual-adjust-label">${t.targetTable}:</div><input type="number" id="adjust-amount" placeholder="${t.adjustPlaceholder}"><div class="manual-adjust-btns"><button class="btn-add" onclick="applyManualAdjustment(true)">+</button><button class="btn-sub" onclick="applyManualAdjustment(false)">-</button></div>`;
        }

        checkExpiry();
        loadData();
        render();
    </script>
</body>
</html>
