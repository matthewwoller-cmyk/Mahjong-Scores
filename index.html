<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mahjong Score Tracker</title>
    <style>
    .rules-link { text-align: center; margin-bottom: 25px; }
.rules-link a { color: #2980b9; text-decoration: none; font-weight: bold; padding: 8px 15px; border: 1px solid #2980b9; border-radius: 20px; transition: 0.2s; }
.rules-link a:hover { background-color: #2980b9; color: white; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fdfbf7;
            color: #333;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
        }
        
        /* Language Toggle Styles */
        .lang-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            background: #e0e0e0;
            border-radius: 20px;
            overflow: hidden;
        }
        .lang-toggle button {
            background: transparent;
            border: none;
            padding: 8px 15px;
            font-size: 0.9rem;
            cursor: pointer;
            color: #7f8c8d;
            font-weight: bold;
            transition: 0.3s;
            border-radius: 20px;
        }
        .lang-toggle button.active {
            background: #2c3e50;
            color: white;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 5px;
            margin-top: 30px;
        }
        .subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        /* Top Controls */
        .top-controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 25px;
        }
        .top-controls button {
            flex: 1;
            max-width: 300px;
            padding: 12px 20px;
            font-size: 1.1rem;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: opacity 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .top-controls button:active:not(:disabled) { opacity: 0.8; }
        .btn-undo { background-color: #f39c12; }
        .btn-undo:disabled { background-color: #bdc3c7; cursor: not-allowed; box-shadow: none; }
        
        /* Master Scoreboard Styles */
        .master-scoreboard {
            background: #2c3e50;
            color: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .combined-net-label {
            font-size: 1rem;
            color: #bdc3c7;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        .combined-net-value {
            font-size: 3.5rem;
            font-weight: bold;
            margin-bottom: 20px;
            border-bottom: 1px solid #34495e;
            padding-bottom: 20px;
            width: 100%;
        }
        .combined-net-value.positive { color: #2ecc71; }
        .combined-net-value.negative { color: #e74c3c; }
        .combined-net-value.neutral { color: #ecf0f1; }

        .tally-row {
            display: flex;
            justify-content: space-around;
            width: 100%;
        }
        .tally-item {
            flex: 1;
            padding: 0 5px;
        }
        .tally-name {
            font-size: 0.95rem;
            color: #bdc3c7;
            font-weight: bold;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .tally-value {
            font-size: 1.6rem;
            font-weight: bold;
        }
        .tally-value.positive { color: #2ecc71; }
        .tally-value.negative { color: #e74c3c; }
        .tally-value.neutral { color: #ecf0f1; }

        /* Manual Adjust Section */
        .manual-adjust {
            background: #fff;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin-bottom: 25px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            justify-content: center;
        }
        .manual-adjust select, .manual-adjust input {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 1rem;
            flex: 1;
            min-width: 120px;
        }
        .manual-adjust-btns {
            display: flex;
            gap: 10px;
        }
        .manual-adjust-btns button {
            width: 50px;
            padding: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .manual-adjust-btns button:active { opacity: 0.8; }
        .btn-add { background-color: #27ae60; }
        .btn-sub { background-color: #e74c3c; }

        /* Board & Collapsible Cards */
        .board {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .player-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            overflow: hidden;
            transition: all 0.3s ease;
        }
        
        /* Card Header (Always Visible) */
        .card-header {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            background-color: #fff;
            user-select: none;
        }
        .header-left {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        .header-name {
            font-size: 1.1rem;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 5px;
        }
        .header-score {
            font-size: 1.8rem;
            font-weight: bold;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
            text-align: right;
        }
        .header-info {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            font-size: 0.85rem;
            color: #7f8c8d;
        }
        .header-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 8px;
            font-weight: bold;
            color: white;
            margin-top: 4px;
            font-size: 0.8rem;
        }
        .collapse-icon {
            font-size: 1.2rem;
            color: #bdc3c7;
            transition: transform 0.3s ease;
        }

        /* Card Body (Collapsible Content) */
        .card-body {
            padding: 15px;
            background-color: #fcfcfc;
            border-top: 1px solid #eee;
        }
        .name-container {
            margin-bottom: 15px;
        }
        .name-input {
            font-size: 1.2rem;
            font-weight: bold;
            color: #2c3e50;
            text-align: center;
            border: none;
            border-bottom: 2px dashed #ccc;
            width: 100%;
            background: transparent;
            padding-bottom: 5px;
        }
        .name-input:focus {
            outline: none;
            border-bottom: 2px solid #3498db;
        }
        
        .positive { color: #27ae60; }
        .negative { color: #e74c3c; }
        .neutral { color: #34495e; }
        .bg-debt { background-color: #c0392b; }
        .bg-banked { background-color: #27ae60; }
        
        .points-input {
            width: calc(100% - 24px);
            padding: 12px;
            font-size: 1.1rem;
            text-align: center;
            border: 2px solid #ddd;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        .action-buttons button {
            flex: 1;
            padding: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .action-buttons button:active:not(:disabled) { opacity: 0.8; }
        .btn-win { background-color: #27ae60; }
        .btn-lose { background-color: #e74c3c; }
        
        .btn-special { 
            width: 100%; 
            margin-top: 8px; 
            padding: 12px;
            font-size: 1rem;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .btn-special:active:not(:disabled) { opacity: 0.8; }
        .btn-half { background-color: #16a085; }
        .btn-surrender { background-color: #f39c12; }
        .btn-bank { background-color: #8e44ad; }
        .btn-tally-local { background-color: #2980b9; margin-top: 20px; }
        
        .btn-special:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
            color: #7f8c8d;
        }
        
        .footer-controls {
            text-align: center;
            margin-top: 30px;
        }
        .btn-hard-reset {
            background-color: transparent;
            color: #e74c3c;
            border: 1px solid #e74c3c;
            padding: 10px 20px;
            font-size: 0.9rem;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn-hard-reset:hover {
            background-color: #e74c3c;
            color: white;
        }
    </style>
</head>
<body>

    <div class="lang-toggle">
        <button id="lang-en" onclick="setLanguage('en')">EN</button>
        <button id="lang-zh" onclick="setLanguage('zh')">粵</button>
    </div>

        <h1 id="ui-title">Mahjong Score Tracker</h1>
    <div class="subtitle" id="ui-subtitle">Base 5 points auto-applied.</div>
    
    <div class="rules-link">
        <a href="rules.html">📖 View Taiwanese Scoring Rules</a>
    </div>

    <div class="top-controls">
        <button class="btn-undo" id="btn-undo" onclick="undoLastAction()" disabled>⟲ Undo Last Action</button>
    </div>

    <div class="master-scoreboard" id="master-scoreboard"></div>

    <div class="manual-adjust" id="manual-adjust-container"></div>

    <div class="board" id="board"></div>

    <div class="footer-controls">
        <button class="btn-hard-reset" id="btn-hard-reset" onclick="hardReset()">Hard Reset (Wipe Everything)</button>
    </div>

    <script>
        // --- Translations Dictionary ---
        const i18n = {
            en: {
                title: "Mahjong Score Tracker",
                subtitle: "Base 5 points auto-applied.",
                netScore: "Combined Table Net Score",
                noStreak: "No active streak",
                winStreak: "Win Streak",
                lossStreak: "Loss Streak",
                multiplier: "1.5x Active",
                handPoints: "Hand points",
                winBtn: "Win (+)",
                loseBtn: "Lose (-)",
                revengeBtn: "Revenge",
                bankNeed3: "Bank / Surrender (Need 3 Streak)",
                bankWinnings: "Bank Winnings & Reset",
                surrenderDebt: "Surrender & Set Aside Debt",
                undoBtn: "⟲ Undo Last Action",
                tallyBtn: "Pay & Update Tally",
                resetBtn: "Hard Reset (Wipe Everything)",
                badgeDebt: "Debt: ",
                badgeBanked: "Banked: +",
                adjustPlaceholder: "Amount",
                targetTable: "Table Net Score",
                confirmBank: "Do you want to bank your winnings of",
                confirmSurrender: "Do you want to set aside your debt of",
                confirmResetStreak: "points and reset your active streak?",
                confirmPlayerPay: "Update this player's tally? This will add their active score and banked/debt points to the Master Scoreboard, and reset their board.",
                confirmWipe: "WARNING: Are you sure you want to completely WIPE EVERYTHING? This will delete the Master Scoreboard too!"
            },
            zh: {
                title: "麻雀計分器",
                subtitle: "自動加上5分底分。",
                netScore: "全檯總結算",
                noStreak: "沒有連勝/連敗",
                winStreak: "連勝",
                lossStreak: "連敗",
                multiplier: "1.5倍生效",
                handPoints: "番數 / 分數",
                winBtn: "贏 (+)",
                loseBtn: "輸 (-)",
                revengeBtn: "報仇",
                bankNeed3: "儲起 / 投降 (需連中3次)",
                bankWinnings: "儲起贏分並重置",
                surrenderDebt: "投降並記下欠債",
                undoBtn: "⟲ 復原上一步",
                tallyBtn: "找數並更新總結算",
                resetBtn: "完全重置 (清除所有資料)",
                badgeDebt: "欠債: ",
                badgeBanked: "儲起: +",
                adjustPlaceholder: "手動調整分數",
                targetTable: "全檯總結算",
                confirmBank: "你確定要儲起",
                confirmSurrender: "你確定要記下",
                confirmResetStreak: "分並重置連擊嗎？",
                confirmPlayerPay: "更新此玩家的總結算？這會將他們的活躍分數和儲起/欠債加到總結算，並重置其版面。",
                confirmWipe: "警告：確定要完全清除所有資料嗎？這會把總結算也一併刪除！"
            }
        };

        let currentLang = localStorage.getItem('mahjongLang') || 'en';

        function setLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('mahjongLang', lang);
            render();
        }

        const defaultPlayers = [
            { id: 0, name: "Player 1", score: 0, streakType: null, streakCount: 0, setAsidePoints: 0, runningTally: 0, isExpanded: false },
            { id: 1, name: "Player 2", score: 0, streakType: null, streakCount: 0, setAsidePoints: 0, runningTally: 0, isExpanded: false },
            { id: 2, name: "Player 3", score: 0, streakType: null, streakCount: 0, setAsidePoints: 0, runningTally: 0, isExpanded: false }
        ];

        let players = defaultPlayers;
        let tableOffset = 0;
        let historyStack = []; 

        const savedData = JSON.parse(localStorage.getItem('mahjongData'));
        if (savedData) {
            if (Array.isArray(savedData)) {
                players = savedData;
            } else {
                players = savedData.players || defaultPlayers;
                tableOffset = savedData.tableOffset || 0;
            }
            // Ensure backwards compatibility for isExpanded property
            players.forEach(p => { if(p.isExpanded === undefined) p.isExpanded = false; });
        }

        function saveData() {
            localStorage.setItem('mahjongData', JSON.stringify({ players, tableOffset }));
        }

        function saveStateForUndo() {
            historyStack.push({
                players: JSON.parse(JSON.stringify(players)),
                tableOffset: tableOffset
            });
            if (historyStack.length > 20) {
                historyStack.shift();
            }
        }

        function undoLastAction() {
            if (historyStack.length > 0) {
                const previousState = historyStack.pop(); 
                players = previousState.players;
                tableOffset = previousState.tableOffset;
                saveData();
                render();
            }
        }

        function applyManualAdjustment(isAdd) {
            const target = document.getElementById('adjust-target').value;
            const amountInput = document.getElementById('adjust-amount');
            let amount = parseInt(amountInput.value);
            
            if (isNaN(amount) || amount <= 0) return;
            
            saveStateForUndo();
            if (!isAdd) amount = -amount;

            if (target === 'table') {
                tableOffset += amount;
            } else {
                const idx = parseInt(target);
                players[idx].runningTally += amount;
            }
            
            amountInput.value = '';
            saveData();
            render();
        }

        function toggleCollapse(index) {
            players[index].isExpanded = !players[index].isExpanded;
            saveData(); // Save view state but don't add to undo history
            render();
        }

        function halveScore(index) {
            saveStateForUndo(); 
            let p = players[index];
            
            if (p.score > 0) {
                p.score = Math.floor(p.score / 2);
            } else if (p.score < 0) {
                p.score = Math.ceil(p.score / 2);
            }
            
            saveData();
            render();
        }

        function render() {
            const t = i18n[currentLang];

            // Update Language Toggle Buttons
            document.getElementById('lang-en').classList.toggle('active', currentLang === 'en');
            document.getElementById('lang-zh').classList.toggle('active', currentLang === 'zh');

            // Update Static Text
            document.getElementById('ui-title').innerText = t.title;
            document.getElementById('ui-subtitle').innerText = t.subtitle;
            document.getElementById('btn-undo').innerText = t.undoBtn;
            document.getElementById('btn-hard-reset').innerText = t.resetBtn;

            const board = document.getElementById('board');
            const scoreboard = document.getElementById('master-scoreboard');
            const manualAdjustContainer = document.getElementById('manual-adjust-container');
            const undoBtn = document.getElementById('btn-undo');
            
            board.innerHTML = ''; 
            undoBtn.disabled = (historyStack.length === 0);

            let globalNetScore = tableOffset;
            let playerTalliesHtml = '<div class="tally-row">';
            let playerOptionsHtml = `<option value="table">${t.targetTable}</option>`;

            players.forEach((p, index) => {
                globalNetScore += p.runningTally;
                playerOptionsHtml += `<option value="${index}">${p.name}</option>`;

                let tallyClass = 'neutral';
                let displayTally = p.runningTally;
                if (p.runningTally > 0) {
                    tallyClass = 'positive';
                    displayTally = "+" + p.runningTally;
                } else if (p.runningTally < 0) {
                    tallyClass = 'negative';
                }

                playerTalliesHtml += `
                    <div class="tally-item">
                        <div class="tally-name">${p.name}</div>
                        <div class="tally-value ${tallyClass}">${displayTally}</div>
                    </div>
                `;

                // --- Build the Player Cards ---
                let scoreClass = 'neutral';
                let displayScore = p.score;
                if (p.score > 0) {
                    scoreClass = 'positive';
                    displayScore = "+" + p.score;
                } else if (p.score < 0) {
                    scoreClass = 'negative';
                }

                // Collapsed header streak info
                let headerStreakText = '';
                if (p.streakCount > 0) {
                    const typeText = p.streakType === 'win' ? t.winStreak : t.lossStreak;
                    const color = p.streakType === 'win' ? "#27ae60" : "#e74c3c";
                    headerStreakText = `<span style="color: ${color}; font-weight: bold;">${p.streakCount} ${typeText}</span>`;
                }

                // Collapsed header badge info
                let headerBadgeHtml = '';
                if (p.setAsidePoints < 0) {
                    headerBadgeHtml = `<div class="header-badge bg-debt">${t.badgeDebt}${p.setAsidePoints}</div>`;
                } else if (p.setAsidePoints > 0) {
                    headerBadgeHtml = `<div class="header-badge bg-banked">${t.badgeBanked}${p.setAsidePoints}</div>`;
                }

                // Expanded view streak info
                let expandedStreakHtml = `<div class="streak">${t.noStreak}</div>`;
                if (p.streakCount > 0) {
                    const typeText = p.streakType === 'win' ? t.winStreak : t.lossStreak;
                    const color = p.streakType === 'win' ? "#27ae60" : "#e74c3c";
                    expandedStreakHtml = `<div class="streak" style="color: ${color}">${p.streakCount} ${typeText}<br>(${t.multiplier})</div>`;
                }

                let isSpecialEnabled = (p.streakCount >= 3);
                let specialBtnClass = 'btn-special';
                let specialBtnText = t.bankNeed3;
                
                if (p.streakType === 'win') {
                    specialBtnClass += ' btn-bank';
                    specialBtnText = t.bankWinnings;
                } else if (p.streakType === 'lose') {
                    specialBtnClass += ' btn-surrender';
                    specialBtnText = t.surrenderDebt;
                }

                let specialBtnHtml = `<button class="${specialBtnClass}" onclick="bankOrSurrender(${index})" ${isSpecialEnabled ? '' : 'disabled'}>${specialBtnText}</button>`;
                let halfBtnHtml = `<button class="btn-special btn-half" onclick="halveScore(${index})" ${p.score === 0 ? 'disabled' : ''}>${t.revengeBtn}</button>`;
                let tallyBtnHtml = `<button class="btn-special btn-tally-local" onclick="sweepPlayerToTally(${index})">${t.tallyBtn}</button>`;

                const card = document.createElement('div');
                card.className = 'player-card';
                card.innerHTML = `
                    <div class="card-header" onclick="toggleCollapse(${index})">
                        <div class="header-left">
                            <div class="header-name">${p.name}</div>
                            <div class="header-score ${scoreClass}">${displayScore}</div>
                        </div>
                        <div class="header-right">
                            <div class="header-info">
                                ${headerStreakText}
                                ${headerBadgeHtml}
                            </div>
                            <div class="collapse-icon" style="transform: rotate(${p.isExpanded ? '180deg' : '0deg'});">▼</div>
                        </div>
                    </div>
                    
                    <div class="card-body" style="display: ${p.isExpanded ? 'block' : 'none'};">
                        <div class="name-container">
                            <input type="text" class="name-input" value="${p.name}" onchange="updateName(${index}, this.value)" placeholder="Edit Name">
                        </div>
                        
                        ${expandedStreakHtml}
                        <input type="number" id="points-${index}" class="points-input" placeholder="${t.handPoints}" min="0">
                        
                        <div class="action-buttons">
                            <button class="btn-win" onclick="recordHand(${index}, 'win')">${t.winBtn}</button>
                            <button class="btn-lose" onclick="recordHand(${index}, 'lose')">${t.loseBtn}</button>
                        </div>
                        
                        ${halfBtnHtml}
                        ${specialBtnHtml}
                        ${tallyBtnHtml}
                    </div>
                `;
                board.appendChild(card);
            });

            playerTalliesHtml += '</div>';

            let netClass = 'neutral';
            let netDisplay = globalNetScore;
            if (globalNetScore > 0) {
                netClass = 'positive';
                netDisplay = "+" + globalNetScore;
            } else if (globalNetScore < 0) {
                netClass = 'negative';
            }

            scoreboard.innerHTML = `
                <div class="combined-net-label">${t.netScore}</div>
                <div class="combined-net-value ${netClass}">${netDisplay}</div>
                ${playerTalliesHtml}
            `;

            manualAdjustContainer.innerHTML = `
                <select id="adjust-target">${playerOptionsHtml}</select>
                <input type="number" id="adjust-amount" placeholder="${t.adjustPlaceholder}" min="0">
                <div class="manual-adjust-btns">
                    <button class="btn-add" onclick="applyManualAdjustment(true)">+</button>
                    <button class="btn-sub" onclick="applyManualAdjustment(false)">-</button>
                </div>
            `;
        }

        function updateName(index, newName) {
            saveStateForUndo();
            players[index].name = newName;
            saveData(); 
            render(); 
        }

        function recordHand(index, resultType) {
            saveStateForUndo(); 
            
            const pointsInput = document.getElementById(`points-${index}`);
            const inputPoints = parseInt(pointsInput.value);
            const points = isNaN(inputPoints) ? 0 : inputPoints; 
            const totalHandPoints = points + 5; 

            let p = players[index];

            if (p.streakType === resultType) {
                let currentMagnitude = Math.abs(p.score);
                let newMagnitude = Math.ceil(currentMagnitude * 1.5);
                p.score = p.score >= 0 ? newMagnitude : -newMagnitude;
                p.streakCount++;
            } else {
                p.streakType = resultType;
                p.streakCount = 1;
            }

            if (resultType === 'win') {
                p.score += totalHandPoints;
            } else {
                p.score -= totalHandPoints;
            }

            // Optional: Automatically clear the input field after scoring
            pointsInput.value = '';
            
            saveData(); 
            render();
        }

        function bankOrSurrender(index) {
            let p = players[index];
            const t = i18n[currentLang];
            let actionText = p.score > 0 ? t.confirmBank : t.confirmSurrender;
            
            if (confirm(`${actionText} ${p.score} ${t.confirmResetStreak}`)) {
                saveStateForUndo(); 
                
                p.setAsidePoints += p.score; 
                p.score = 0;
                p.streakType = null;
                p.streakCount = 0;
                
                saveData(); 
                render();
            }
        }

        function sweepPlayerToTally(index) {
            if (confirm(i18n[currentLang].confirmPlayerPay)) {
                saveStateForUndo(); 
                
                let p = players[index];
                p.runningTally += (p.score + p.setAsidePoints);
                p.score = 0;
                p.streakType = null;
                p.streakCount = 0;
                p.setAsidePoints = 0;
                
                saveData(); 
                render();
            }
        }

        function hardReset() {
            if (confirm(i18n[currentLang].confirmWipe)) {
                historyStack = []; 
                tableOffset = 0;
                players = [
                    { id: 0, name: "Player 1", score: 0, streakType: null, streakCount: 0, setAsidePoints: 0, runningTally: 0, isExpanded: false },
                    { id: 1, name: "Player 2", score: 0, streakType: null, streakCount: 0, setAsidePoints: 0, runningTally: 0, isExpanded: false },
                    { id: 2, name: "Player 3", score: 0, streakType: null, streakCount: 0, setAsidePoints: 0, runningTally: 0, isExpanded: false }
                ];
                
                saveData(); 
                render();
            }
        }

        render();
    </script>
</body>
</html>
